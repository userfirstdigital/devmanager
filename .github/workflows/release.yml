name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    # Skip if the push was from the auto-bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${VERSION}"

          # Update version in all config files
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${VERSION}\"/" package.json
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"${CURRENT}\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          NSIS_SIG=$(cat "src-tauri/target/release/bundle/nsis/DevManager_${VERSION}_x64-setup.exe.sig")
          REPO="${GITHUB_REPOSITORY}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release notes on GitHub for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/DevManager_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/DevManager_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/DevManager_*_x64-setup.exe.sig
            src-tauri/target/release/bundle/msi/DevManager_*_x64_en-US.msi
            src-tauri/target/release/bundle/msi/DevManager_*_x64_en-US.msi.sig
            latest.json

      - name: Push version bump back to repo
        shell: bash
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "release: v${VERSION} [skip ci]"
          git push origin master
