name: Release

on:
  push:
    branches:
      - native
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive release version from Cargo.toml
        id: version
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          cargo_toml = pathlib.Path("Cargo.toml")
          data = tomllib.loads(cargo_toml.read_text(encoding="utf-8"))
          base_version = data["package"]["version"]
          run_number = os.environ["RUN_NUMBER"]
          if "-" in base_version:
              release_version = f"{base_version}.{run_number}"
          else:
              release_version = f"{base_version}-dev.{run_number}"

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"base_version={base_version}\n")
              handle.write(f"release_version={release_version}\n")
              handle.write(f"tag_name=v{release_version}\n")
          print(f"Base version: {base_version}")
          print(f"Release version: {release_version}")
          PY

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x86_64
            formats: nsis
          - runner: macos-15
            platform: darwin-aarch64
            formats: app,dmg
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Apply CI release version
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          cargo_toml = pathlib.Path("Cargo.toml")
          contents = cargo_toml.read_text(encoding="utf-8")
          updated = re.sub(
              r'(?ms)^\\[package\\]\\s+(?:.*?\\n)*?version = "[^"]+"',
              lambda match: match.group(0).rsplit('"', 2)[0] + f'"{version}"',
              contents,
              count=1,
          )
          cargo_toml.write_text(updated, encoding="utf-8")
          PY

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --locked

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Package native app
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
          DEVMANAGER_UPDATE_ENDPOINTS: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          DEVMANAGER_UPDATE_PUBKEY: ${{ vars.DEVMANAGER_UPDATE_PUBKEY }}
          DEVMANAGER_UPDATE_WINDOWS_INSTALL_MODE: passive
        run: cargo packager --release --formats "${{ matrix.formats }}"

      - name: Collect packaged artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p "release-artifacts/${PLATFORM}"
          cp -R dist/packager/. "release-artifacts/${PLATFORM}/"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release-artifacts/${{ matrix.platform }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate latest.json manifest
        shell: bash
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.release_version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib
          import sys

          root = pathlib.Path("release-artifacts")
          repo = os.environ["REPO"]
          version = os.environ["VERSION"]
          tag_name = os.environ["TAG_NAME"]

          def pick_asset(directory: pathlib.Path, pattern: str) -> pathlib.Path:
              matches = sorted(directory.glob(pattern))
              if not matches:
                  raise SystemExit(f"Missing asset matching {pattern!r} in {directory}")
              return matches[0]

          def read_signature(path: pathlib.Path) -> str:
              return path.read_text(encoding="utf-8").strip()

          platforms = {}

          windows_dir = root / "windows-x86_64"
          if windows_dir.exists():
              installer = pick_asset(windows_dir, "*.exe")
              signature_path = pathlib.Path(f"{installer}.sig")
              if signature_path.exists():
                  platforms["windows-x86_64"] = {
                      "format": "nsis",
                      "signature": read_signature(signature_path),
                      "url": f"https://github.com/{repo}/releases/download/{tag_name}/{installer.name}",
                  }

          mac_dir = root / "darwin-aarch64"
          if mac_dir.exists():
              updater_bundle = pick_asset(mac_dir, "*.app.tar.gz")
              signature_path = pathlib.Path(f"{updater_bundle}.sig")
              if signature_path.exists():
                  platforms["darwin-aarch64"] = {
                      "format": "app",
                      "signature": read_signature(signature_path),
                      "url": f"https://github.com/{repo}/releases/download/{tag_name}/{updater_bundle.name}",
                  }

          if not platforms:
              raise SystemExit("No updater-ready artifacts were found.")

          manifest = {
              "version": version,
              "notes": "See the GitHub release notes for details.",
              "pub_date": dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          pathlib.Path("latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: DevManager ${{ needs.prepare.outputs.release_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/windows-x86_64/*
            release-artifacts/darwin-aarch64/*
            latest.json
