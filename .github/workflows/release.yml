name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: "1.94.0"
  CARGO_PACKAGER_VERSION: "0.11.8"
  NSIS_VERSION: "3.12.0"
  WIX_VERSION: "3.14.1.20250415"
  WIX_BINARY_VERSION: "3.14.1.8722"

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Verify browser web UI
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix web ci --no-audit --no-fund
          npm --prefix web audit --audit-level=high
          npm --prefix web test
          npm --prefix web run typecheck
          rm -rf web/bundle
          npm --prefix web run build
          if [ -n "$(git status --porcelain -- web/bundle)" ]; then
            git status --short -- web/bundle
            git diff -- web/bundle
            echo "Generated web/bundle differs from the tracked bundle." >&2
            exit 1
          fi

      - name: Verify Rust source and tests
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo test --locked --all-targets -- --test-threads=1

  prepare:
    needs: verify
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Compute next patch release version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import tomllib

          cargo_toml = pathlib.Path("Cargo.toml")
          cargo_lock = pathlib.Path("Cargo.lock")
          cargo_data = tomllib.loads(cargo_toml.read_text(encoding="utf-8"))
          base_version = cargo_data["package"]["version"].strip()
          stable_semver = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)$")

          def parse_version(value: str) -> tuple[int, int, int]:
              match = stable_semver.fullmatch(value.strip())
              if not match:
                  raise SystemExit(
                      f"Expected a stable version like 0.2.1 or v0.2.1, got `{value}`."
                  )
              return tuple(int(group) for group in match.groups())

          latest_tag = ""
          latest_tag_version = None
          for raw_tag in subprocess.check_output(
              ["git", "tag", "--list", "v*", "--sort=-v:refname"],
              text=True,
          ).splitlines():
              tag = raw_tag.strip()
              if stable_semver.fullmatch(tag):
                  latest_tag = tag
                  latest_tag_version = parse_version(tag)
                  break

          base_tuple = parse_version(base_version)
          if latest_tag_version is None:
              release_version = base_version
          elif base_tuple > latest_tag_version:
              release_version = base_version
          else:
              major, minor, patch = latest_tag_version
              release_version = f"{major}.{minor}.{patch + 1}"

          cargo_lines = cargo_toml.read_text(encoding="utf-8").splitlines(keepends=True)
          in_package = False
          cargo_updated = False
          for index, line in enumerate(cargo_lines):
              stripped = line.strip()
              if stripped == "[package]":
                  in_package = True
                  continue
              if in_package and stripped.startswith("[") and stripped != "[package]":
                  in_package = False
              if in_package and stripped.startswith('version = "') and not cargo_updated:
                  cargo_lines[index] = re.sub(
                      r'version = "[^"]+"',
                      f'version = "{release_version}"',
                      line,
                      count=1,
                  )
                  cargo_updated = True
                  break
          if not cargo_updated:
              raise SystemExit("Failed to update package version in Cargo.toml.")
          cargo_toml.write_text("".join(cargo_lines), encoding="utf-8")

          lock_lines = cargo_lock.read_text(encoding="utf-8").splitlines(keepends=True)
          in_package = False
          target_package = False
          lock_updated = False
          for index, line in enumerate(lock_lines):
              stripped = line.strip()
              if stripped == "[[package]]":
                  in_package = True
                  target_package = False
                  continue
              if in_package and stripped.startswith('name = "'):
                  target_package = stripped == 'name = "devmanager"'
                  continue
              if in_package and target_package and stripped.startswith('version = "') and not lock_updated:
                  lock_lines[index] = re.sub(
                      r'version = "[^"]+"',
                      f'version = "{release_version}"',
                      line,
                      count=1,
                  )
                  lock_updated = True
                  break
          if not lock_updated:
              raise SystemExit("Failed to update the root package version in Cargo.lock.")
          cargo_lock.write_text("".join(lock_lines), encoding="utf-8")

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"base_version={base_version}\n")
              handle.write(f"release_version={release_version}\n")
              handle.write(f"tag_name=v{release_version}\n")

          print(f"Current branch version: {base_version}")
          print(f"Latest existing tag: {latest_tag or 'none'}")
          print(f"Next release version: {release_version}")
          PY

      - name: Commit version bump back to branch
        id: commit
        shell: bash
        env:
          TARGET_BRANCH: master
          VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "[skip ci] chore(release): bump version to ${VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x86_64
            formats: nsis,wix
          - runner: windows-11-arm
            platform: windows-aarch64
            formats: nsis
          - runner: macos-15
            platform: macos-aarch64
            formats: app,dmg
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Validate release signing configuration
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          DEVMANAGER_UPDATE_PUBKEY: ${{ vars.DEVMANAGER_UPDATE_PUBKEY }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_PACKAGER_SIGN_PRIVATE_KEY:-}" ]; then
            echo "Missing secret: CARGO_PACKAGER_SIGN_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEVMANAGER_UPDATE_PUBKEY:-}" ]; then
            echo "Missing repository variable: DEVMANAGER_UPDATE_PUBKEY" >&2
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify embedded browser web UI bundle
        shell: bash
        run: cargo test remote::web::assets --lib

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --version "${CARGO_PACKAGER_VERSION}" --locked

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis --version="$env:NSIS_VERSION" --allow-downgrade -y --no-progress
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey failed to install NSIS $env:NSIS_VERSION."
          }
          $nsisBin = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsisBin "makensis.exe"
          if (-not (Test-Path -LiteralPath $makensis -PathType Leaf)) {
            throw "NSIS executable was not found at $makensis."
          }
          $actual = (& $makensis /VERSION | Out-String).Trim()
          if ($actual -ne "v3.12") {
            throw "Unexpected NSIS version: $actual"
          }
          $nsisBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure WiX Toolset
        if: runner.os == 'Windows' && matrix.platform == 'windows-x86_64'
        shell: powershell
        run: |
          choco install wixtoolset --version="$env:WIX_VERSION" --allow-downgrade -y --no-progress
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey failed to install WiX $env:WIX_VERSION."
          }

          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $wixRoot) {
            throw "WiX installation directory was not found."
          }
          $wixBin = Join-Path $wixRoot.FullName "bin"
          $candle = Join-Path $wixBin "candle.exe"
          $light = Join-Path $wixBin "light.exe"
          foreach ($tool in @($candle, $light)) {
            if (-not (Test-Path -LiteralPath $tool -PathType Leaf)) {
              throw "Missing WiX tool after setup: $tool"
            }
          }
          $actual = (& $candle -? 2>&1 | Out-String)
          if ($actual -notmatch [regex]::Escape($env:WIX_BINARY_VERSION)) {
            throw "Unexpected WiX compiler version: $actual"
          }
          $env:Path = "$wixBin;$env:Path"
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package app
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
          DEVMANAGER_UPDATE_ENDPOINTS: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          DEVMANAGER_UPDATE_PUBKEY: ${{ vars.DEVMANAGER_UPDATE_PUBKEY }}
          DEVMANAGER_UPDATE_WINDOWS_INSTALL_MODE: passive
        run: cargo packager --release --formats "${{ matrix.formats }}"

      - name: Collect packaged artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p "release-artifacts/${PLATFORM}"
          cp -R dist/packager/. "release-artifacts/${PLATFORM}/"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.platform }}
          path: release-artifacts/${{ matrix.platform }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-artifacts

      - name: Validate and stage the release contract
        shell: bash
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.release_version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib
          import shutil

          root = pathlib.Path("release-artifacts")
          repo = os.environ["REPO"]
          version = os.environ["VERSION"]
          tag_name = os.environ["TAG_NAME"]
          publish_dir = pathlib.Path("publish-assets")
          if publish_dir.exists():
              shutil.rmtree(publish_dir)
          publish_dir.mkdir()

          required_assets = {
              "windows-x86_64": [
                  ("Windows x64 NSIS installer", "*_x64-setup.exe"),
                  ("Windows x64 NSIS signature", "*_x64-setup.exe.sig"),
                  ("Windows x64 WiX installer", "*.msi"),
                  ("Windows x64 WiX signature", "*.msi.sig"),
              ],
              "windows-aarch64": [
                  ("Windows ARM64 NSIS installer", "*_arm64-setup.exe"),
                  ("Windows ARM64 NSIS signature", "*_arm64-setup.exe.sig"),
              ],
              "macos-aarch64": [
                  ("macOS updater archive", "*.app.tar.gz"),
                  ("macOS updater signature", "*.app.tar.gz.sig"),
                  ("macOS disk image", "*.dmg"),
                  ("macOS disk image signature", "*.dmg.sig"),
              ],
          }
          updater_assets = {
              "windows-x86_64": {
                  "pattern": "*_x64-setup.exe",
                  "format": "nsis",
              },
              "windows-aarch64": {
                  "pattern": "*_arm64-setup.exe",
                  "format": "nsis",
              },
              "macos-aarch64": {
                  "pattern": "*.app.tar.gz",
                  "format": "app",
              },
          }

          def pick_single_asset(directory: pathlib.Path, pattern: str, label: str) -> pathlib.Path:
              matches = sorted(path for path in directory.glob(pattern) if path.is_file())
              if len(matches) != 1:
                  raise SystemExit(
                      f"Expected exactly one {label} matching {pattern!r} in {directory}, "
                      f"found {len(matches)}."
                  )
              asset = matches[0]
              if asset.stat().st_size <= 0:
                  raise SystemExit(f"Required release asset is empty: {asset}")
              return asset

          def read_signature(path: pathlib.Path) -> str:
              if not path.is_file():
                  raise SystemExit(f"Missing updater signature: {path}")
              signature = path.read_text(encoding="utf-8").strip()
              if not signature:
                  raise SystemExit(f"Updater signature is empty: {path}")
              return signature

          selected = []
          for platform, contract in required_assets.items():
              directory = root / platform
              if not directory.is_dir():
                  raise SystemExit(f"Missing packaged artifacts for {platform}: {directory}")
              for label, pattern in contract:
                  asset = pick_single_asset(directory, pattern, label)
                  selected.append(asset)
                  if asset.suffix == ".sig":
                      read_signature(asset)

          names = [asset.name for asset in selected]
          if len(selected) != 10 or len(names) != len(set(names)):
              raise SystemExit(
                  f"Release contract requires 10 uniquely named platform files, found {sorted(names)}"
              )
          for asset in selected:
              shutil.copy2(asset, publish_dir / asset.name)

          platforms = {}
          for platform, metadata in updater_assets.items():
              directory = root / platform
              if not directory.is_dir():
                  raise SystemExit(f"Missing packaged artifacts for {platform}: {directory}")
              asset = pick_single_asset(directory, metadata["pattern"], f"{platform} updater asset")
              signature = read_signature(pathlib.Path(f"{asset}.sig"))
              platforms[platform] = {
                  "format": metadata["format"],
                  "signature": signature,
                  "url": f"https://github.com/{repo}/releases/download/{tag_name}/{asset.name}",
              }

          manifest = {
              "version": version,
              "notes": "See the GitHub release notes for details.",
              "pub_date": dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          manifest_path = publish_dir / "latest.json"
          manifest_path.write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          if manifest_path.stat().st_size <= 0:
              raise SystemExit("Generated latest.json is empty")
          print(f"Validated and staged {len(selected) + 1} required release assets.")
          PY

      - name: Create and validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.commit_sha }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
            ACTUAL_SHA="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
            if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
              echo "Release tag ${TAG_NAME} points to ${ACTUAL_SHA}, expected ${EXPECTED_SHA}." >&2
              exit 1
            fi
          else
            git tag "${TAG_NAME}" "${EXPECTED_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          ACTUAL_SHA="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "Release tag ${TAG_NAME} points to ${ACTUAL_SHA}, expected ${EXPECTED_SHA}." >&2
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          url = f"https://api.github.com/repos/{os.environ['REPO']}/releases/tags/{os.environ['TAG_NAME']}"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "User-Agent": "devmanager-release-workflow",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  release = json.load(response)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  raise SystemExit(0)
              raise SystemExit(f"Release lookup failed closed with HTTP {error.code}: {error.reason}")
          except (urllib.error.URLError, TimeoutError) as error:
              raise SystemExit(f"Release lookup failed closed: {error}")
          raise SystemExit(
              f"Release {release.get('tag_name')} already exists "
              f"(draft={release.get('draft')}); refusing to mutate it."
          )
          PY

      - name: Create draft release and upload assets
        id: draft_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.commit_sha }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          set -euo pipefail
          gh release create "${TAG_NAME}" publish-assets/* \
            --repo "${REPO}" \
            --draft \
            --latest=false \
            --verify-tag \
            --target "${EXPECTED_SHA}" \
            --title "DevManager ${VERSION}" \
            --generate-notes
          mapfile -t RELEASE_IDS < <(
            gh api --paginate "repos/${REPO}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\" and .draft == true) | .id"
          )
          if [ "${#RELEASE_IDS[@]}" -ne 1 ]; then
            echo "Expected one draft release for ${TAG_NAME}, found ${#RELEASE_IDS[@]}." >&2
            exit 1
          fi
          RELEASE_ID="${RELEASE_IDS[0]}"
          echo "id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Verify draft assets and publish atomically
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ needs.prepare.outputs.commit_sha }}
          RELEASE_ID: ${{ steps.draft_release.outputs.id }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          ACTUAL_SHA="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "Draft tag ${TAG_NAME} points to ${ACTUAL_SHA}, expected ${EXPECTED_SHA}." >&2
            exit 1
          fi
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import subprocess

          expected_paths = sorted(
              path for path in pathlib.Path("publish-assets").iterdir() if path.is_file()
          )
          expected = {
              path.name: {
                  "size": path.stat().st_size,
                  "digest": "sha256:" + hashlib.sha256(path.read_bytes()).hexdigest(),
              }
              for path in expected_paths
          }
          if len(expected) != 11 or any(metadata["size"] <= 0 for metadata in expected.values()):
              raise SystemExit(
                  f"Expected exactly 11 non-empty staged release assets, found {sorted(expected)}"
              )
          assets = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['REPO']}/releases/{os.environ['RELEASE_ID']}/assets",
                  ],
                  text=True,
              )
          )
          actual = {asset["name"]: asset for asset in assets}
          if sorted(actual) != sorted(expected):
              raise SystemExit(
                  "Draft asset mismatch. "
                  f"Expected {sorted(expected)}, found {sorted(actual)}."
              )
          for name, metadata in expected.items():
              asset = actual[name]
              if asset.get("state") != "uploaded":
                  raise SystemExit(f"Draft asset {name} is not fully uploaded: {asset.get('state')}")
              if asset.get("size") != metadata["size"]:
                  raise SystemExit(
                      f"Draft asset {name} size mismatch: expected {metadata['size']}, "
                      f"found {asset.get('size')}"
                  )
              if asset.get("digest") != metadata["digest"]:
                  raise SystemExit(
                      f"Draft asset {name} digest mismatch: expected {metadata['digest']}, "
                      f"found {asset.get('digest')}"
                  )
          print(f"Verified names, sizes, and SHA-256 digests for {len(actual)} draft assets.")
          PY
          gh api \
            --method PATCH \
            "repos/${REPO}/releases/${RELEASE_ID}" \
            -F draft=false \
            -F prerelease=false \
            -f make_latest=true \
            >/dev/null
          if [ "$(gh api "repos/${REPO}/releases/${RELEASE_ID}" --jq .draft)" != "false" ]; then
            echo "Release ${TAG_NAME} did not leave draft state." >&2
            exit 1
          fi
