name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next patch release version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import tomllib

          cargo_toml = pathlib.Path("Cargo.toml")
          cargo_lock = pathlib.Path("Cargo.lock")
          cargo_data = tomllib.loads(cargo_toml.read_text(encoding="utf-8"))
          base_version = cargo_data["package"]["version"].strip()
          stable_semver = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)$")

          def parse_version(value: str) -> tuple[int, int, int]:
              match = stable_semver.fullmatch(value.strip())
              if not match:
                  raise SystemExit(
                      f"Expected a stable version like 0.2.1 or v0.2.1, got `{value}`."
                  )
              return tuple(int(group) for group in match.groups())

          latest_tag = ""
          latest_tag_version = None
          for raw_tag in subprocess.check_output(
              ["git", "tag", "--list", "v*", "--sort=-v:refname"],
              text=True,
          ).splitlines():
              tag = raw_tag.strip()
              if stable_semver.fullmatch(tag):
                  latest_tag = tag
                  latest_tag_version = parse_version(tag)
                  break

          base_tuple = parse_version(base_version)
          if latest_tag_version is None:
              release_version = base_version
          elif base_tuple > latest_tag_version:
              release_version = base_version
          else:
              major, minor, patch = latest_tag_version
              release_version = f"{major}.{minor}.{patch + 1}"

          cargo_lines = cargo_toml.read_text(encoding="utf-8").splitlines(keepends=True)
          in_package = False
          cargo_updated = False
          for index, line in enumerate(cargo_lines):
              stripped = line.strip()
              if stripped == "[package]":
                  in_package = True
                  continue
              if in_package and stripped.startswith("[") and stripped != "[package]":
                  in_package = False
              if in_package and stripped.startswith('version = "') and not cargo_updated:
                  cargo_lines[index] = re.sub(
                      r'version = "[^"]+"',
                      f'version = "{release_version}"',
                      line,
                      count=1,
                  )
                  cargo_updated = True
                  break
          if not cargo_updated:
              raise SystemExit("Failed to update package version in Cargo.toml.")
          cargo_toml.write_text("".join(cargo_lines), encoding="utf-8")

          lock_lines = cargo_lock.read_text(encoding="utf-8").splitlines(keepends=True)
          in_package = False
          target_package = False
          lock_updated = False
          for index, line in enumerate(lock_lines):
              stripped = line.strip()
              if stripped == "[[package]]":
                  in_package = True
                  target_package = False
                  continue
              if in_package and stripped.startswith('name = "'):
                  target_package = stripped == 'name = "devmanager"'
                  continue
              if in_package and target_package and stripped.startswith('version = "') and not lock_updated:
                  lock_lines[index] = re.sub(
                      r'version = "[^"]+"',
                      f'version = "{release_version}"',
                      line,
                      count=1,
                  )
                  lock_updated = True
                  break
          if not lock_updated:
              raise SystemExit("Failed to update the root package version in Cargo.lock.")
          cargo_lock.write_text("".join(lock_lines), encoding="utf-8")

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"base_version={base_version}\n")
              handle.write(f"release_version={release_version}\n")
              handle.write(f"tag_name=v{release_version}\n")

          print(f"Current branch version: {base_version}")
          print(f"Latest existing tag: {latest_tag or 'none'}")
          print(f"Next release version: {release_version}")
          PY

      - name: Commit version bump back to branch
        id: commit
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "[skip ci] chore(release): bump version to ${VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x86_64
            formats: nsis,wix
          - runner: macos-15
            platform: darwin-aarch64
            formats: app,dmg
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Validate release signing configuration
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          DEVMANAGER_UPDATE_PUBKEY: ${{ vars.DEVMANAGER_UPDATE_PUBKEY }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_PACKAGER_SIGN_PRIVATE_KEY:-}" ]; then
            echo "Missing secret: CARGO_PACKAGER_SIGN_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEVMANAGER_UPDATE_PUBKEY:-}" ]; then
            echo "Missing repository variable: DEVMANAGER_UPDATE_PUBKEY" >&2
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --locked

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Ensure WiX Toolset
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $requiredTools = @("candle.exe", "light.exe")
          $missing = $requiredTools | Where-Object { -not (Get-Command $_ -ErrorAction SilentlyContinue) }
          if ($missing.Count -gt 0) {
            choco install wixtoolset -y --no-progress
            $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
              Sort-Object Name -Descending |
              Select-Object -First 1
            if ($wixRoot) {
              $wixBin = Join-Path $wixRoot.FullName "bin"
              if (Test-Path $wixBin) {
                $env:Path = "$wixBin;$env:Path"
                $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              }
            }
          }

          foreach ($tool in $requiredTools) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              throw "Missing WiX tool after setup: $tool"
            }
          }

      - name: Package app
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
          DEVMANAGER_UPDATE_ENDPOINTS: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          DEVMANAGER_UPDATE_PUBKEY: ${{ vars.DEVMANAGER_UPDATE_PUBKEY }}
          DEVMANAGER_UPDATE_WINDOWS_INSTALL_MODE: passive
        run: cargo packager --release --formats "${{ matrix.formats }}"

      - name: Collect packaged artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          mkdir -p "release-artifacts/${PLATFORM}"
          cp -R dist/packager/. "release-artifacts/${PLATFORM}/"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: release-artifacts/${{ matrix.platform }}
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Generate latest.json manifest
        shell: bash
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.release_version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib

          root = pathlib.Path("release-artifacts")
          repo = os.environ["REPO"]
          version = os.environ["VERSION"]
          tag_name = os.environ["TAG_NAME"]
          required_platforms = {
              "windows-x86_64": {
                  "pattern": "*_x64-setup.exe",
                  "format": "nsis",
              },
              "darwin-aarch64": {
                  "pattern": "*.app.tar.gz",
                  "format": "app",
              },
          }

          def pick_single_asset(directory: pathlib.Path, pattern: str, label: str) -> pathlib.Path:
              matches = sorted(directory.glob(pattern))
              if len(matches) != 1:
                  raise SystemExit(
                      f"Expected exactly one {label} matching {pattern!r} in {directory}, "
                      f"found {len(matches)}."
                  )
              return matches[0]

          def read_signature(path: pathlib.Path) -> str:
              if not path.is_file():
                  raise SystemExit(f"Missing updater signature: {path}")
              signature = path.read_text(encoding="utf-8").strip()
              if not signature:
                  raise SystemExit(f"Updater signature is empty: {path}")
              return signature

          platforms = {}
          for platform, metadata in required_platforms.items():
              directory = root / platform
              if not directory.is_dir():
                  raise SystemExit(f"Missing packaged artifacts for {platform}: {directory}")
              asset = pick_single_asset(directory, metadata["pattern"], f"{platform} updater asset")
              signature = read_signature(pathlib.Path(f"{asset}.sig"))
              platforms[platform] = {
                  "format": metadata["format"],
                  "signature": signature,
                  "url": f"https://github.com/{repo}/releases/download/{tag_name}/{asset.name}",
              }

          manifest = {
              "version": version,
              "notes": "See the GitHub release notes for details.",
              "pub_date": dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          pathlib.Path("latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: DevManager ${{ needs.prepare.outputs.release_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/windows-x86_64/*
            release-artifacts/darwin-aarch64/*
            latest.json
